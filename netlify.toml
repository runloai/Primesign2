[build]
  command = "./node_modules/.bin/vite build && cp -f public/config.json dist/config.json && cp -f public/admin.html dist/admin.html"
  publish = "dist"
  functions = "netlify/functions"

# Redirect API calls to Netlify function
[[redirects]]
  from = "/api/publish"
  to = "/.netlify/functions/publish"
  status = 200

# SPA fallback. Netlify serves existing static files before this redirect.
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

# Headers for security
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-XSS-Protection = "1; mode=block"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
