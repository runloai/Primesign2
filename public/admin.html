<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PrimeSign | Admin Control Center</title>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #0a0a0f;
      --bg-secondary: #111118;
      --bg-card: #1a1a25;
      --gold: #f0a830;
      --cyan: #00d4ff;
      --text: #f5f5f7;
      --text-muted: #888;
      --border: rgba(255,255,255,0.1);
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }
    
    .login-page { display: flex; align-items: center; justify-content: center; min-height: 100vh; }
    .login-box { background: var(--bg-card); padding: 40px; border-radius: 16px; width: 100%; max-width: 400px; border: 1px solid var(--border); }
    .login-box h2 { margin-bottom: 24px; text-align: center; font-family: 'Space Grotesk', sans-serif; }
    .login-box input { width: 100%; padding: 14px; margin-bottom: 16px; border: 1px solid var(--border); border-radius: 8px; background: var(--bg-secondary); color: var(--text); font-size: 16px; }
    .login-box button { width: 100%; padding: 14px; background: var(--gold); border: none; border-radius: 8px; color: #000; font-weight: 600; cursor: pointer; font-size: 16px; }
    .login-box button:hover { background: #ffb84d; }
    
    .admin-page { display: none; }
    .admin-header { background: var(--bg-card); padding: 16px 24px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid var(--border); }
    .admin-header h1 { font-family: 'Space Grotesk', sans-serif; font-size: 20px; }
    .nav-buttons { display: flex; gap: 8px; flex-wrap: wrap; }
    .nav-btn { padding: 10px 16px; background: var(--bg-secondary); border: 1px solid var(--border); border-radius: 8px; color: var(--text); cursor: pointer; transition: all 0.2s; }
    .nav-btn:hover { background: var(--bg-card); border-color: var(--gold); }
    .nav-btn.active { background: var(--gold); color: #000; border-color: var(--gold); }
    
    .admin-content { padding: 24px; max-width: 1200px; margin: 0 auto; }
    .tab-content { display: none; }
    .tab-content.active { display: block; }
    
    .section-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 24px; }
    .section-title { font-family: 'Space Grotesk', sans-serif; font-size: 28px; }
    
    .btn { padding: 10px 20px; border: none; border-radius: 8px; cursor: pointer; font-weight: 500; }
    .btn-primary { background: var(--gold); color: #000; }
    .btn-secondary { background: var(--bg-card); color: var(--text); border: 1px solid var(--border); }
    .btn-danger { background: #dc2626; color: white; }
    
    .category-card, .service-card { background: var(--bg-card); padding: 20px; border-radius: 12px; margin-bottom: 16px; border: 1px solid var(--border); }
    .category-card h3, .service-card h4 { margin-bottom: 8px; }
    .card-actions { display: flex; gap: 8px; margin-top: 12px; }
    
    .items-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 16px; }
    
    .form-group { margin-bottom: 16px; }
    .form-group label { display: block; margin-bottom: 6px; font-weight: 500; }
    .form-group input, .form-group select { width: 100%; padding: 12px; background: var(--bg-secondary); border: 1px solid var(--border); border-radius: 8px; color: var(--text); }
    
    .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.8); display: flex; align-items: center; justify-content: center; z-index: 1000; }
    .modal-overlay.hidden { display: none; }
    .modal { background: var(--bg-card); padding: 32px; border-radius: 16px; width: 100%; max-width: 500px; max-height: 90vh; overflow-y: auto; }
    .modal h3 { margin-bottom: 24px; }
    .modal-actions { display: flex; gap: 12px; justify-content: flex-end; margin-top: 24px; }
    
    .status-bar { padding: 8px 16px; background: var(--bg-card); font-size: 14px; color: var(--text-muted); display: flex; justify-content: space-between; }
    .unsaved { color: #fbbf24; }
    .saved { color: #22c55e; }
  </style>
</head>
<body>
  <!-- Login Page -->
  <div id="loginPage" class="login-page">
    <div class="login-box">
      <h2>⚡ Admin Login</h2>
      <input type="text" id="username" placeholder="Username">
      <input type="password" id="password" placeholder="Password">
      <button onclick="doLogin()">🔐 Sign In</button>
    </div>
  </div>

  <!-- Admin Page -->
  <div id="adminPage" class="admin-page">
    <header class="admin-header">
      <h1>⚡ PRIMESIGN Admin</h1>
      <nav class="nav-buttons">
        <button class="nav-btn active" onclick="switchTab('dashboard')">📊 Dashboard</button>
        <button class="nav-btn" onclick="switchTab('arsenal')">🛠️ The Arsenal</button>
        <button class="nav-btn" onclick="switchTab('settings')">⚙️ Settings</button>
        <button class="nav-btn" onclick="logout()">Logout</button>
      </nav>
    </header>
    
    <div class="status-bar">
      <span id="statusText" class="saved">✓ All changes saved</span>
      <button class="btn btn-primary" onclick="saveAll()">💾 Save & Publish</button>
    </div>

    <main class="admin-content">
      <!-- Dashboard Tab -->
      <div id="tab-dashboard" class="tab-content active">
        <h2 class="section-title">📊 Dashboard</h2>
        <p style="margin: 20px 0; color: var(--text-muted);">Welcome to Primesign Admin Control Center</p>
      </div>

      <!-- The Arsenal Tab -->
      <div id="tab-arsenal" class="tab-content">
        <div class="section-header">
          <h2 class="section-title">🛠️ The Arsenal - Services & Categories</h2>
        </div>
        
        <h3 style="margin: 24px 0 16px;">📁 Categories</h3>
        <button class="btn btn-primary" onclick="showAddCategory()">+ Add Category</button>
        <div id="categoriesList" class="items-grid" style="margin-top: 16px;"></div>
        
        <h3 style="margin: 32px 0 16px;">🛠️ Services</h3>
        <button class="btn btn-primary" onclick="showAddService()">+ Add Service</button>
        <div id="servicesList" class="items-grid" style="margin-top: 16px;"></div>
      </div>

      <!-- Settings Tab -->
      <div id="tab-settings" class="tab-content">
        <h2 class="section-title">⚙️ Settings</h2>
        <p style="margin: 20px 0; color: var(--text-muted);">Additional settings coming soon</p>
      </div>
    </main>
  </div>

  <!-- Add Category Modal -->
  <div id="categoryModal" class="modal-overlay hidden">
    <div class="modal">
      <h3>Add New Category</h3>
      <div class="form-group">
        <label>Category ID (e.g., new-category)</label>
        <input type="text" id="catId" placeholder="new-category">
      </div>
      <div class="form-group">
        <label>Category Label (e.g., NEW CATEGORY)</label>
        <input type="text" id="catLabel" placeholder="NEW CATEGORY">
      </div>
      <div class="form-group">
        <label>Description</label>
        <input type="text" id="catDesc" placeholder="Description">
      </div>
      <div class="modal-actions">
        <button class="btn btn-secondary" onclick="closeCategoryModal()">Cancel</button>
        <button class="btn btn-primary" onclick="saveCategory()">Save Category</button>
      </div>
    </div>
  </div>

  <!-- Add Service Modal -->
  <div id="serviceModal" class="modal-overlay hidden">
    <div class="modal">
      <h3>Add New Service</h3>
      <div class="form-group">
        <label>Service Name</label>
        <input type="text" id="svcName" placeholder="Service Name">
      </div>
      <div class="form-group">
        <label>Category</label>
        <select id="svcCategory"></select>
      </div>
      <div class="form-group">
        <label>Description</label>
        <input type="text" id="svcDesc" placeholder="Description">
      </div>
      <div class="modal-actions">
        <button class="btn btn-secondary" onclick="closeServiceModal()">Cancel</button>
        <button class="btn btn-primary" onclick="saveService()">Save Service</button>
      </div>
    </div>
  </div>

  <script>
    // Simple working admin panel
    const STORAGE_KEY = 'primesign-config';
    let config = null;
    let hasChanges = false;

    // Load config from server
    async function loadConfig() {
      try {
        const resp = await fetch('/config.json?_=' + Date.now());
        config = await resp.json();
      } catch(e) {
        console.error('Failed to load config:', e);
        config = { services: [], serviceCategories: [] };
      }
    }

    // Login
    function doLogin() {
      const u = document.getElementById('username').value;
      const p = document.getElementById('password').value;
      if (u === 'admin' && p === 'Primesign@2021') {
        localStorage.setItem('primesign-auth', 'true');
        showAdmin();
      } else {
        alert('Invalid credentials');
      }
    }

    function logout() {
      localStorage.removeItem('primesign-auth');
      location.reload();
    }

    async function showAdmin() {
      document.getElementById('loginPage').style.display = 'none';
      document.getElementById('adminPage').style.display = 'block';
      await loadConfig();
      renderCategories();
      renderServices();
    }

    // Tab switching
    function switchTab(tabName) {
      document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
      document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
      document.getElementById('tab-' + tabName).classList.add('active');
      event.target.classList.add('active');
    }

    // Render categories
    function renderCategories() {
      const container = document.getElementById('categoriesList');
      const cats = config.serviceCategories || [];
      container.innerHTML = cats.map(cat => `
        <div class="category-card">
          <h3>${cat.icon || '📁'} ${cat.label}</h3>
          <p style="color: var(--text-muted); font-size: 14px;">${cat.description || ''}</p>
          <p style="color: var(--text-muted); font-size: 12px; margin-top: 8px;">ID: ${cat.id}</p>
          <div class="card-actions">
            <button class="btn btn-danger btn-sm" onclick="deleteCategory('${cat.id}')">🗑️ Delete</button>
          </div>
        </div>
      `).join('');
    }

    // Render services
    function renderServices() {
      const container = document.getElementById('servicesList');
      const svcs = config.services || [];
      container.innerHTML = svcs.map(svc => `
        <div class="service-card">
          <h4>${svc.name}</h4>
          <p style="color: var(--text-muted); font-size: 14px;">${svc.desc || ''}</p>
          <p style="color: var(--cyan); font-size: 12px; margin-top: 8px;">Category: ${svc.category}</p>
          <div class="card-actions">
            <button class="btn btn-danger btn-sm" onclick="deleteService(${svc.id})">🗑️ Delete</button>
          </div>
        </div>
      `).join('');
    }

    // Category modal
    function showAddCategory() {
      document.getElementById('categoryModal').classList.remove('hidden');
    }

    function closeCategoryModal() {
      document.getElementById('categoryModal').classList.add('hidden');
    }

    function saveCategory() {
      const id = document.getElementById('catId').value.trim();
      const label = document.getElementById('catLabel').value.trim();
      const desc = document.getElementById('catDesc').value.trim();
      
      if (!id || !label) {
        alert('Please fill in ID and Label');
        return;
      }
      
      if (!config.serviceCategories) config.serviceCategories = [];
      config.serviceCategories.push({
        id: id,
        label: label,
        icon: '📁',
        description: desc,
        items: []
      });
      
      hasChanges = true;
      renderCategories();
      closeCategoryModal();
      updateStatus('Category added - click Save to publish');
    }

    function deleteCategory(catId) {
      if (!confirm('Delete this category?')) return;
      config.serviceCategories = config.serviceCategories.filter(c => c.id !== catId);
      hasChanges = true;
      renderCategories();
      updateStatus('Category deleted - click Save to publish');
    }

    // Service modal
    function showAddService() {
      const sel = document.getElementById('svcCategory');
      const cats = config.serviceCategories || [];
      sel.innerHTML = cats.map(c => `<option value="${c.id}">${c.label}</option>`).join('');
      document.getElementById('serviceModal').classList.remove('hidden');
    }

    function closeServiceModal() {
      document.getElementById('serviceModal').classList.add('hidden');
    }

    function saveService() {
      const name = document.getElementById('svcName').value.trim();
      const category = document.getElementById('svcCategory').value;
      const desc = document.getElementById('svcDesc').value.trim();
      
      if (!name) {
        alert('Please enter service name');
        return;
      }
      
      if (!config.services) config.services = [];
      const newId = Math.max(0, ...config.services.map(s => s.id)) + 1;
      config.services.push({
        id: newId,
        name: name,
        desc: desc,
        category: category,
        images: [],
        badge: ''
      });
      
      hasChanges = true;
      renderServices();
      closeServiceModal();
      updateStatus('Service added - click Save to publish');
    }

    function deleteService(svcId) {
      if (!confirm('Delete this service?')) return;
      config.services = config.services.filter(s => s.id !== svcId);
      hasChanges = true;
      renderServices();
      updateStatus('Service deleted - click Save to publish');
    }

    // Save and publish
    async function saveAll() {
      if (!config) return;
      
      // Update serviceCategories with items from services
      const serviceByCat = {};
      config.services.forEach(s => {
        const cat = s.category || 'General';
        if (!serviceByCat[cat]) serviceByCat[cat] = [];
        serviceByCat[cat].push(s);
      });
      
      config.serviceCategories = (config.serviceCategories || []).map(cat => ({
        ...cat,
        items: serviceByCat[cat.id] || []
      }));
      
      try {
        // Save locally
        localStorage.setItem(STORAGE_KEY, JSON.stringify(config));
        
        // Publish to server as JSON
        const resp = await fetch('http://3.110.186.195:9998/publish', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(config)
        });
        
        const result = await resp.json();
        
        if (resp.ok && result.ok) {
          hasChanges = false;
          updateStatus('✓ Saved and published!');
          alert('Saved successfully!');
        } else {
          alert('Failed to publish: ' + (result.error || resp.status));
        }
      } catch(e) {
        console.error('Save error:', e);
        alert('Save error: ' + e.message);
      }
    }

    function updateStatus(msg) {
      const el = document.getElementById('statusText');
      el.textContent = msg;
      el.className = hasChanges ? 'unsaved' : 'saved';
    }

    // Check auth on load
    window.onload = function() {
      if (localStorage.getItem('primesign-auth') === 'true') {
        showAdmin();
      }
    };
  </script>
</body>
</html>
